<!DOCTYPE html>
<html lang="es" x-data="appBus()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MED BASHA PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#707070">
    <link class="sello-medbasha" data-value="medbasha" />
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk1pcyBUdXJub3MgVGFtYm9yIiwKICAic2hvcnRfbmFtZSI6ICJNQlAgUFJPIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwZjE3MmEiLAogICJ0aGVtZV9jb2xvciI6ICIjNzA3MDcwIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzQ0OC8zNDQ4MzM5LnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448339.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        @keyframes amber-pulse {
            0%, 100% { background-color: rgba(245, 158, 11, 0.6); box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
            50% { background-color: rgba(245, 158, 11, 1); box-shadow: 0 0 20px rgba(245, 158, 11, 0.8); }
        }
        .animate-amber { animation: amber-pulse 1.5s infinite; color: white !important; border: 1px solid rgba(255,255,255,0.3); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; transition: all 0.3s ease; overflow-x: hidden; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        .input-dark { 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 8px; text-align: center; outline: none; width: 100%; color: white;
            transition: border-color 0.2s ease;
        }
        .input-dark:focus { border-color: #3b82f6; }
        input[type="time"].input-dark { font-size: 1.6rem !important; font-weight: 900; }
        input[type="text"].input-dark { font-size: 1.3rem !important; font-weight: 800; color: #fbbf24; }
        input[type="number"].input-dark { font-size: 1.1rem !important; font-weight: 700; color: #22d3ee; }

        .lcd-clock { font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; transition: transform 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .semana-header { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent); border-left: 4px solid #3b82f6; }
        .firma-footer { font-family: 'Georgia', serif; font-style: italic; letter-spacing: 1px; opacity: 0.5; }
    </style>
</head>
<body :style="'font-size: ' + settings.fontSize + 'px;'">

    <!-- SISTEMA DE NOTIFICACIONES (TOASTS) -->
    <div class="fixed top-4 left-0 w-full flex justify-center z-[100] pointer-events-none" x-show="toast.visible" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 -translate-y-5" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-5" x-cloak>
        <div class="glass-card px-5 py-3 rounded-full flex items-center gap-3 shadow-2xl border" :class="toast.isError ? 'border-red-500/50 bg-red-900/30' : 'border-green-500/50 bg-green-900/30'">
            <span class="text-lg" x-text="toast.isError ? '⚠️' : '✅'"></span>
            <span class="text-[11px] font-black uppercase text-white tracking-wide" x-text="toast.msg"></span>
        </div>
    </div>

    <!-- PANTALLA 1: INICIO -->
    <div x-show="screen === 1" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak class="p-4 max-w-md mx-auto pb-24">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter" :style="'color:' + settings.colorMaestro">MED BASHA PRO</h1>
                <p class="text-[10px] text-slate-500 uppercase font-black">Conductor Menorca</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="firma-footer text-xs">medbasha</span>
                <button @click="screen = 4; actualizarIconos()" class="p-2 bg-slate-800 rounded-full active:scale-90 transition-transform"><i data-lucide="settings"></i></button>
            </div>
        </header>

        <div class="glass-card rounded-3xl p-4 mb-4 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <button @click="changeMonth(-1)" class="p-2 active:scale-75 transition-transform"><i data-lucide="chevron-left"></i></button>
                <h2 class="font-bold text-lg" x-text="monthNames[currentMonth] + ' ' + currentYear"></h2>
                <button @click="changeMonth(1)" class="p-2 active:scale-75 transition-transform"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-500 mb-2">
                <span>LU</span><span>MA</span><span>MI</span><span>JU</span><span>VI</span><span>SA</span><span>DO</span>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center">
                <template x-for="day in daysInMonth">
                    <button @click="day.num ? seleccionarDia(day.num) : null" 
                         class="h-10 flex flex-col items-center justify-center rounded-xl relative transition-all active:scale-90" 
                         :class="day.isToday ? 'bg-blue-600 font-bold shadow-lg shadow-blue-900/50' : (day.num ? 'hover:bg-white/5' : '')">
                        <span x-text="day.num"></span>
                        <div class="flex gap-0.5 mt-0.5" x-show="tieneRegistro(day.num)">
                            <div :class="obtenerTipoRegistro(day.num) === 'partida' ? 'bg-orange-500' : 'bg-blue-400'" class="w-1.5 h-1.5 rounded-full"></div>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <div @click="abrirAlarma()" class="glass-card rounded-2xl p-3 mb-6 flex items-center justify-center border-t-2 border-t-white/10 shadow-inner cursor-pointer active:scale-95 transition">
            <div class="flex flex-col items-center">
                <span class="text-[8px] font-black text-slate-500 uppercase tracking-[0.2em] mb-1">Reloj de a bordo</span>
                <div class="text-3xl font-black lcd-clock text-white" x-text="timeNow">00:00:00</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button @click="openRegistro('continua')" class="glass-card p-6 rounded-3xl flex flex-col items-center gap-3 border-b-4 border-blue-500 active:scale-95 transition">
                <i data-lucide="timer" class="text-blue-500 w-8 h-8"></i>
                <span class="font-black uppercase text-xs">Continua</span>
            </button>
            <button @click="openRegistro('partida')" class="glass-card p-6 rounded-3xl flex flex-col items-center gap-3 border-b-4 border-orange-500 active:scale-95 transition">
                <i data-lucide="split" class="text-orange-500 w-8 h-8"></i>
                <span class="font-black uppercase text-xs">Partida</span>
            </button>
        </div>

        <button @click="screen = 3; calcularTotales(); actualizarIconos()" class="w-full mt-6 glass-card p-5 rounded-2xl flex justify-between items-center active:bg-white/5 active:scale-95 transition">
            <span class="font-bold text-sm uppercase italic">Resumen Nómina (Ciclo 16-15)</span>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-600"></i>
        </button>
    </div>

    <!-- PANTALLA 2: REGISTRO DE JORNADA -->
    <div x-show="screen === 2" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak class="p-4 max-w-md mx-auto pb-44">
        <header class="flex items-center gap-4 mb-6">
            <button @click="volverAlInicio()" class="p-2 bg-slate-800 rounded-full active:scale-90 transition"><i data-lucide="arrow-left"></i></button>
            <div class="flex-1">
                <h2 class="text-xl font-black uppercase tracking-tighter" x-text="form.esPartida ? 'Jornada Partida' : 'Jornada Continua'"></h2>
                <p class="text-[10px] text-blue-400 font-bold" x-text="'Fecha: ' + fechaSeleccionada"></p>
            </div>
            <button x-show="!form.esPartida" @click="form.esPartida = true; calcular(); guardarBorrador();" class="bg-orange-600 text-white p-2 rounded-full shadow-lg active:scale-75 transition">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="space-y-4">
            <div class="glass-card p-4 rounded-3xl border-l-4 border-blue-500 transition-all duration-300">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-black text-blue-400 uppercase">Bus Mañana</span>
                    <input type="text" x-model="form.bus1" @input="guardarBorrador()" placeholder="BUS 1" autocapitalize="characters" autocomplete="off" autocorrect="off" spellcheck="false" class="w-24 input-dark uppercase">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="time" x-model="form.hE1" @change="calcular(); guardarBorrador()" class="input-dark">
                    <input type="time" x-model="form.hS1" @change="calcular(); guardarBorrador()" class="input-dark">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="1" x-model="form.kmI1" @input="calcular(); guardarBorrador()" placeholder="KM Ini" class="input-dark">
                    <input type="number" step="1" x-model="form.kmF1" @input="calcular(); guardarBorrador()" placeholder="KM Fin" class="input-dark">
                </div>
                <div class="flex justify-center mt-3">
                    <button @click="ponerHoraActual('hE1')" class="text-[9px] bg-blue-900/50 px-4 py-2 rounded-full border border-blue-500/30 font-black uppercase active:scale-95 transition">Fichar Entrada</button>
                </div>
            </div>

            <div x-show="form.esPartida" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" class="glass-card p-4 rounded-3xl border-l-4 border-orange-500">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-black text-orange-400 uppercase">Bus Tarde</span>
                    <input type="text" x-model="form.bus2" @input="guardarBorrador()" placeholder="BUS 2" autocapitalize="characters" autocomplete="off" autocorrect="off" spellcheck="false" class="w-24 input-dark uppercase">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="time" x-model="form.hE2" @change="calcular(); guardarBorrador()" class="input-dark">
                    <input type="time" x-model="form.hS2" @change="calcular(); guardarBorrador()" class="input-dark">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="1" x-model="form.kmI2" @input="calcular(); guardarBorrador()" placeholder="KM Ini" class="input-dark">
                    <input type="number" step="1" x-model="form.kmF2" @input="calcular(); guardarBorrador()" placeholder="KM Fin" class="input-dark">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-6">
                <button @click="manualComida = true; form.comida = !form.comida; guardarBorrador()" 
                        :class="form.comida ? (autoComidaCalc ? 'bg-green-600' : 'animate-amber') : 'bg-slate-800 opacity-40'" 
                        class="p-4 rounded-2xl flex flex-col items-center gap-1 font-black transition-all active:scale-95 border border-transparent">
                    <i data-lucide="utensils" class="w-4 h-4"></i><span class="text-[9px] uppercase">Comida</span>
                </button>

                <button @click="manualCena = true; form.cena = !form.cena; guardarBorrador()" 
                        :class="form.cena ? (autoCenaCalc ? 'bg-green-600' : 'animate-amber') : 'bg-slate-800 opacity-40'" 
                        class="p-4 rounded-2xl flex flex-col items-center gap-1 font-black transition-all active:scale-95 border border-transparent">
                    <i data-lucide="moon" class="w-4 h-4"></i><span class="text-[9px] uppercase">Cena</span>
                </button>

                <button @click="form.festivo = !form.festivo; guardarBorrador()" 
                        :class="form.festivo ? 'bg-red-600' : 'bg-slate-800 opacity-40'" 
                        class="p-4 rounded-2xl flex flex-col items-center gap-1 font-black transition-all active:scale-95">
                    <i data-lucide="calendar-heart" class="w-4 h-4"></i><span class="text-[9px] uppercase">Festivo</span>
                </button>
            </div>
            <p class="text-center mt-2 text-[8px] text-slate-500 font-bold tracking-widest uppercase">
                <span class="text-green-500">■ Auto</span> &nbsp; <span class="text-amber-500">■ Excepción (Manual)</span>
            </p>
        </div>

        <div class="fixed bottom-0 left-0 w-full glass-card border-t border-white/10 p-6 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <div class="text-center transition-all duration-300">
                    <p class="text-[9px] text-slate-500 font-black mb-1 uppercase">H. Total</p>
                    <span class="text-3xl font-black text-green-400" x-text="res.hTotal">06:00</span>
                </div>
                <div class="text-center transition-all duration-300">
                    <p class="text-[9px] text-slate-500 font-black mb-1 uppercase">KM Totales</p>
                    <span class="text-3xl font-black" :class="errorKm ? 'text-red-500' : 'text-cyan-400'" x-text="errorKm ? 'ERROR' : res.kmTotal">0</span>
                </div>
                <button @click="guardarJornada()" 
                        :disabled="errorKm"
                        :style="errorKm ? 'background-color: #334155' : 'background-color:' + settings.colorMaestro" 
                        class="text-white p-5 rounded-full shadow-2xl active:scale-75 transition-all duration-200">
                    <i data-lucide="save" class="w-7 h-7"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- PANTALLA 3: NÓMINA Y RESUMEN SEMANAL -->
    <div x-show="screen === 3" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak class="p-4 max-w-md mx-auto pb-32">
        <header class="flex justify-between items-center mb-4">
            <button @click="screen = 1" class="p-2 bg-slate-800 rounded-full active:scale-90 transition"><i data-lucide="arrow-left"></i></button>
            <h2 class="text-xl font-black uppercase tracking-tighter italic">Nómina del Ciclo</h2>
        </header>

        <div class="mb-6">
            <div class="bg-blue-600 text-[11px] font-black text-white px-4 py-2 rounded-t-2xl flex justify-between items-center">
                <span x-text="cicloLabel"></span>
                <span class="firma-footer text-[10px]">medbasha</span>
            </div>
            <div class="glass-card p-4 rounded-b-2xl border-t-2 border-blue-600 shadow-2xl">
                <div class="grid grid-cols-3 gap-4 mb-4 border-b border-white/10 pb-4">
                    <div class="text-center">
                        <span class="block text-[8px] text-slate-500 font-black uppercase">Horas Ciclo</span>
                        <p class="text-2xl font-black text-blue-400" x-text="stats.hTotales"></p>
                    </div>
                    <div class="text-center border-l border-white/5">
                        <span class="block text-[8px] text-slate-500 font-black uppercase">Dietas (C+C)</span>
                        <p class="text-2xl font-black text-green-400" x-text="stats.numDietas"></p>
                    </div>
                    <div class="text-center border-l border-white/5">
                        <span class="block text-[8px] text-slate-500 font-black uppercase">KM Totales</span>
                        <p class="text-xl font-black text-cyan-400 mt-1" x-text="stats.kmTotales"></p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <span class="block text-[8px] text-slate-500 font-black uppercase">Nocturnidad (Horas)</span>
                        <p class="text-2xl font-black text-purple-400" x-text="stats.horasNocturnas"></p>
                    </div>
                    <div class="text-center border-l border-white/5">
                        <span class="block text-[8px] text-slate-500 font-black uppercase">Turnos Partidos</span>
                        <p class="text-2xl font-black text-orange-400" x-text="stats.numPartidas"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-8">
            <template x-for="(semana, index) in semanasAgrupadas" :key="index">
                <div class="space-y-2">
                    <div class="semana-header p-3 rounded-xl flex justify-between items-center">
                        <div>
                            <span class="block text-[10px] font-black text-blue-400 uppercase" x-text="semana.rango"></span>
                            <div class="flex gap-2 text-[8px] font-bold text-slate-400 mt-0.5">
                                <span class="bg-blue-500/10 px-1 rounded" x-text="'H: ' + semana.totalHoras"></span>
                                <span class="bg-green-500/10 px-1 rounded" x-text="'D: ' + semana.totalDietas"></span>
                            </div>
                        </div>
                        <button @click="sincronizarConSheets(semana.registros)" class="bg-green-600/50 text-white px-2 py-1.5 rounded-lg font-black text-[8px] uppercase flex items-center gap-1 active:scale-90 transition">
                            <i data-lucide="cloud-upload" class="w-3 h-3"></i> Subir
                        </button>
                    </div>

                    <div class="glass-card rounded-2xl overflow-hidden border border-white/5">
                        <table class="w-full text-center">
                            <thead class="bg-black/20 text-[10px] text-slate-500 uppercase">
                                <tr>
                                    <th class="p-2 text-left">Día</th>
                                    <th>Bus</th>
                                    <th>H.</th>
                                    <th>Die.</th>
                                    <th>Par.</th>
                                    <th>Noc.</th>
                                    <th>Fes.</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody class="text-[12px] font-bold divide-y divide-white/5">
                                <template x-for="item in semana.registros" :key="item.id">
                                    <tr class="transition hover:bg-white/5">
                                        <td class="p-2 text-left flex items-center gap-1.5 cursor-pointer" @click="cargarRegistro(item)">
                                            <div :class="item.esPartida ? 'bg-orange-500' : 'bg-blue-400'" class="w-1.5 h-1.5 rounded-full shrink-0"></div>
                                            <span x-text="item.fecha"></span>
                                        </td>
                                        <td x-text="item.bus"></td>
                                        <td x-text="item.horas"></td>
                                        <td x-text="item.dietas" class="text-green-400"></td>
                                        <td x-text="item.esPartida ? '1' : '-'" class="text-orange-400"></td>
                                        <td x-text="getMinutosNocturnos(item) > 0 ? formatMins(getMinutosNocturnos(item)) : '-'" class="text-purple-400 text-[10px]"></td>
                                        <td x-text="item.esFestivo ? '1' : '-'" class="text-red-400"></td>
                                        <td class="p-1">
                                            <button @click="borrarRegistro(item.id)" class="text-red-500/30 p-2 active:scale-75 transition">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- PANTATTAN 4: CONFIGURACIÓN -->
    <div x-show="screen === 4" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-cloak class="p-4 max-w-md mx-auto pb-24">
        <header class="flex items-center gap-4 mb-8">
            <button @click="screen = 1" class="p-2 bg-slate-800 rounded-full active:scale-90 transition"><i data-lucide="arrow-left"></i></button>
            <h2 class="text-xl font-black uppercase tracking-tighter">Configuración</h2>
        </header>

        <div class="space-y-6">
            <!-- BOTÓN DE ESTADO DE NUBE INTELIGENTE -->
            <button @click="notificar(esVip() ? 'Estás conectado a la nube privada' : 'Modo local. No se suben datos a la nube.', false)" 
                    class="w-full glass-card p-5 rounded-3xl flex items-center justify-between border-l-4 transition" 
                    :class="esVip() ? 'border-blue-500' : 'border-slate-500'">
                <div class="flex items-center gap-3">
                    <i data-lucide="cloud" :class="esVip() ? 'text-blue-400' : 'text-slate-400'"></i>
                    <div class="text-left">
                        <span class="block text-[10px] font-black uppercase" x-text="esVip() ? 'Sincronización Activa' : 'Modo Compañero (Local)'"></span>
                        <span class="text-[8px] italic font-bold" :class="esVip() ? 'text-green-400' : 'text-slate-500'" x-text="esVip() ? 'Modo VIP: Conectado' : 'Tus datos no salen de tu móvil'"></span>
                    </div>
                </div>
            </button>

            <div class="grid grid-cols-3 gap-3">
                <button @click="abrirCalculadora()" class="glass-card p-4 rounded-3xl flex flex-col items-center gap-2 border-b-4 border-yellow-500 active:scale-95 transition">
                    <i data-lucide="calculator" class="text-yellow-500 w-5 h-5"></i>
                    <span class="font-black uppercase text-[9px]">Calculadora</span>
                </button>
                <button @click="exportarMensualADrive()" class="glass-card p-4 rounded-3xl flex flex-col items-center gap-2 border-b-4 border-green-500 active:scale-95 transition">
                    <i data-lucide="file-spreadsheet" class="text-green-500 w-5 h-5"></i>
                    <span class="font-black uppercase text-[9px]">A mi Drive</span>
                </button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7b6_T0ze2HgXiYHfvUeL12JSXE7ZKogc",
            authDomain: "misturnos-fe3ea.firebaseapp.com",
            databaseURL: "https://misturnos-fe3ea-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "misturnos-fe3ea",
            storageBucket: "misturnos-fe3ea.firebasestorage.app",
            messagingSenderId: "1029095925443",
            appId: "1:1029095925443:web:873240d85ac5160f392476"
        };

        if (!firebase.apps.length) { 
            firebase.initializeApp(firebaseConfig); 
        }
        const db = firebase.database();

        function appBus() {
            return {
                screen: 1, 
                currentMonth: new Date().getMonth(), 
                currentYear: new Date().getFullYear(),
                monthNames:["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"],
                daysInMonth:[], 
                fechaSeleccionada: '', 
                timeNow: '00:00:00', 
                cicloLabel: '',
                palette:['#707070', '#3b82f6', '#f59e0b', '#10b981', '#ef4444'], 
                
                settings: { fontSize: 16, colorMaestro: '#707070', sheetUrl: '', vipKey: '' },
                
                form: { id: null, esPartida: false, bus1: '', hE1: '', hS1: '', kmI1: '', kmF1: '', bus2: '', hE2: '', hS2: '', kmI2: '', kmF2: '', comida: false, cena: false, festivo: false },
                res: { hTotal: '06:00', kmTotal: 0 },
                
                historial:[], 
                semanasAgrupadas:[],
                stats: { hTotales: '0:00', numPartidas: 0, numDietas: 0, numFestivos: 0, kmTotales: 0, horasNocturnas: '00:00' },
                
                manualComida: false,
                manualCena: false,
                autoComidaCalc: false,
                autoCenaCalc: false,

                errorKm: false,
                toast: { visible: false, msg: '', isError: false },
                firebaseIniciado: false,

                init() {
                    this.historial = JSON.parse(localStorage.getItem('bus_historial') || '[]');
                    this.settings = JSON.parse(localStorage.getItem('bus_settings') || JSON.stringify(this.settings));
                    
                    this.renderCalendar(); 
                    this.updateClock(); 
                    this.calcularTotales();
                    setInterval(() => this.updateClock(), 1000); 
                    
                    if (this.esVip()) {
                        this.iniciarSyncAutomatico();
                    }

                    const borradorGuardado = localStorage.getItem('bus_borrador_seguridad');
                    if (borradorGuardado) {
                        try {
                            const datosBorrador = JSON.parse(borradorGuardado);
                            if (datosBorrador && datosBorrador.fechaBorrador) {
                                this.form = datosBorrador;
                                this.fechaSeleccionada = datosBorrador.fechaBorrador;
                                this.screen = 2; 
                                this.calcular(); 
                                this.notificar("Borrador recuperado", false);
                            }
                        } catch (e) { }
                    }
                    this.actualizarIconos();
                },

                esVip() {
                    return this.settings.vipKey === 'bashaVIP';
                },

                checkVip() {
                    this.saveSett();
                    if (this.esVip() && !this.firebaseIniciado) {
                        this.iniciarSyncAutomatico();
                        this.notificar("¡Bienvenido! Nube Conectada", false);
                    }
                },

                notificar(mensaje, esError = false) {
                    this.toast.msg = mensaje;
                    this.toast.isError = esError;
                    this.toast.visible = true;
                    setTimeout(() => { this.toast.visible = false; }, 3500);
                },

                iniciarSyncAutomatico() {
                    if (this.firebaseIniciado) return;
                    this.firebaseIniciado = true;

                    db.ref('jornadas').on('child_added', (snapshot) => {
                        const item = snapshot.val();
                        if(!this.historial.find(h => h.id === item.id)) {
                            this.historial.push(item);
                            this.historial.sort((a,b) => b.id - a.id);
                            this.saveHist();
                            this.calcularTotales();
                        }
                    });

                    db.ref('jornadas').on('child_changed', (snapshot) => {
                        const updatedItem = snapshot.val();
                        const idx = this.historial.findIndex(h => h.id === updatedItem.id);
                        if(idx > -1) {
                            this.historial[idx] = updatedItem;
                            this.saveHist();
                            this.calcularTotales();
                        }
                    });

                    db.ref('jornadas').on('child_removed', (snapshot) => {
                        const removedItem = snapshot.val();
                        this.historial = this.historial.filter(h => h.id !== removedItem.id);
                        this.saveHist();
                        this.calcularTotales();
                    });
                },

                calcularIntervaloNocturno(startStr, endStr) {
                    if (!startStr || !endStr) return 0;
                    let [h1, m1] = startStr.split(':').map(Number);
                    let [h2, m2] = endStr.split(':').map(Number);
                    let start = h1 * 60 + m1;
                    let end = h2 * 60 + m2;
                    
                    let overlap = (s, e) => {
                        let n1 = Math.max(s, 0); let n2 = Math.min(e, 360); 
                        let m1 = Math.max(s, 1320); let m2 = Math.min(e, 1440); 
                        let total = 0;
                        if (n1 < n2) total += (n2 - n1);
                        if (m1 < m2) total += (m2 - m1);
                        return total;
                    };

                    if (start <= end) { return overlap(start, end); } 
                    else { return overlap(start, 1440) + overlap(0, end); }
                },

                getMinutosNocturnos(item) {
                    let mins = this.calcularIntervaloNocturno(item.datos.hE1, item.datos.hS1);
                    if (item.datos.esPartida) {
                        mins += this.calcularIntervaloNocturno(item.datos.hE2, item.datos.hS2);
                    }
                    return mins;
                },

                formatMins(totalMins) {
                    const h = Math.floor(totalMins / 60);
                    const m = totalMins % 60;
                    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                },

                guardarBorrador() {
                    const copia = JSON.parse(JSON.stringify(this.form));
                    copia.fechaBorrador = this.fechaSeleccionada;
                    localStorage.setItem('bus_borrador_seguridad', JSON.stringify(copia));
                },

                updateClock() { 
                    this.timeNow = new Date().toLocaleTimeString('es-ES', { hour12: false }); 
                },
                
                renderCalendar() {
                    let first = new Date(this.currentYear, this.currentMonth, 1).getDay();
                    let days = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
                    first = (first === 0) ? 6 : first - 1; 
                    
                    this.daysInMonth =[];
                    for (let i = 0; i < first; i++) { this.daysInMonth.push({ num: null }); }
                    for (let i = 1; i <= days; i++) {
                        this.daysInMonth.push({ num: i, isToday: new Date().toDateString() === new Date(this.currentYear, this.currentMonth, i).toDateString() });
                    }
                },

                formatearFecha(dia) { return `${dia.toString().padStart(2,'0')}/${(this.currentMonth + 1).toString().padStart(2,'0')}`; },
                tieneRegistro(dia) { return this.historial.some(h => h.fecha === this.formatearFecha(dia)); },
                obtenerTipoRegistro(dia) { return (this.historial.find(h => h.fecha === this.formatearFecha(dia))?.esPartida) ? 'partida' : 'continua'; },

                seleccionarDia(dia) {
                    const f = this.formatearFecha(dia);
                    const r = this.historial.find(h => h.fecha === f);
                    this.fechaSeleccionada = f;
                    
                    if(r) { this.cargarRegistro(r); } 
                    else { this.openRegistro('continua'); }
                },

                openRegistro(t) {
                    this.form = { id: Date.now(), esPartida: (t === 'partida'), bus1: '', hE1: '', hS1: '', kmI1: '', kmF1: '', bus2: '', hE2: '', hS2: '', kmI2: '', kmF2: '', comida: false, cena: false, festivo: false };
                    this.manualComida = false;
                    this.manualCena = false;
                    this.screen = 2; this.calcular(); this.actualizarIconos();
                },

                cargarRegistro(item) {
                    this.form = JSON.parse(JSON.stringify(item.datos));
                    this.fechaSeleccionada = item.fecha; 
                    this.manualComida = false;
                    this.manualCena = false;
                    this.screen = 2; this.calcular(); this.actualizarIconos();
                },

                ponerHoraActual(campo) {
                    const ahora = new Date();
                    this.form[campo] = `${String(ahora.getHours()).padStart(2, '0')}:${String(ahora.getMinutes()).padStart(2, '0')}`;
                    this.calcular(); this.guardarBorrador();
                },

                calcular() {
                    const toM = (t) => { 
                        if(!t) return null; 
                        let [h,m] = t.split(':').map(Number); 
                        return h * 60 + m; 
                    };
                    
                    let e1 = toM(this.form.hE1); let s1 = toM(this.form.hS1);
                    let e2 = toM(this.form.hE2); let s2 = toM(this.form.hS2);
                    
                    let m1 = 0;
                    if (s1 !== null && e1 !== null) { m1 = (s1 < e1) ? (s1 + 1440) - e1 : s1 - e1; }
                    let m2 = 0;
                    if (this.form.esPartida && s2 !== null && e2 !== null) { m2 = (s2 < e2) ? (s2 + 1440) - e2 : s2 - e2; }

                    let realMins = m1 + m2;
                    let totalMins = (realMins > 0 && realMins < 360) ? 360 : realMins;
                    
                    this.res.hTotal = `${Math.floor(totalMins/60).toString().padStart(2,'0')}:${(totalMins%60).toString().padStart(2,'0')}`;
                    
                    let k1 = (parseInt(this.form.kmF1) - parseInt(this.form.kmI1)) || 0;
                    let k2 = (this.form.esPartida) ? ((parseInt(this.form.kmF2) - parseInt(this.form.kmI2)) || 0) : 0;
                    this.res.kmTotal = k1 + k2;
                    
                    this.errorKm = (parseInt(this.form.kmF1) < parseInt(this.form.kmI1)) || (this.form.esPartida && (parseInt(this.form.kmF2) < parseInt(this.form.kmI2)));

                    let autoComida = false;
                    let autoCena = false;
                    let evaluarTramo = null;

                    if (!this.form.esPartida) {
                        if (e1 !== null && s1 !== null) {
                            evaluarTramo = { duracionMin: m1, finMin: s1 };
                        }
                    } else {
                        if (m1 >= m2 && m1 > 0) {
                            evaluarTramo = { duracionMin: m1, finMin: s1 };
                        } else if (m2 > m1) {
                            evaluarTramo = { duracionMin: m2, finMin: s2 };
                        }
                    }

                    if (evaluarTramo) {
                        const { duracionMin, finMin } = evaluarTramo;
                        const horasTrabajadas = duracionMin / 60;

                        // 1. Reglas de Mañana (Comida)
                        if (horasTrabajadas === 9 && finMin === 900) autoComida = true; 
                        if (horasTrabajadas >= 6 && finMin === 930) autoComida = true; 

                        // 2. Reglas de Tarde (Cena)
                        const esFinCenaOmasTarde = (finMin >= 1380 || finMin <= 360); 
                        if (horasTrabajadas >= 6 && esFinCenaOmasTarde) autoCena = true; 
                    }

                    this.autoComidaCalc = autoComida;
                    this.autoCenaCalc = autoCena;

                    // Si el usuario ha tocado manualmente el botón, evitamos sobrescribir el estado calculando de nuevo
                    if (!this.manualComida) { this.form.comida = autoComida; }
                    if (!this.manualCena) { this.form.cena = autoCena; }
                },

                guardarJornada() {
                    if(!this.form.bus1) return this.notificar("Falta el número de BUS", true);
                    if(this.form.hS1 && !this.form.hE1) return this.notificar("Hora de fin sin inicio", true);
                    if(this.errorKm) return this.notificar("Error en los Kilómetros", true);

                    const reg = {
                        id: this.form.id || Date.now(), 
                        fecha: this.fechaSeleccionada,
                        bus: this.form.esPartida ? `${this.form.bus1}/${this.form.bus2||'?'}` : this.form.bus1,
                        horas: this.res.hTotal, 
                        esPartida: this.form.esPartida, 
                        esFestivo: this.form.festivo,
                        dietas: (this.form.comida ? 1 : 0) + (this.form.cena ? 1 : 0),
                        km: this.res.kmTotal, 
                        datos: JSON.parse(JSON.stringify(this.form)),
                        creadoEn: new Date().toISOString()
                    };
                    
                    if (this.esVip()) {
                        db.ref('jornadas/' + reg.id).set(reg)
                            .then(() => {
                                this.notificar("Jornada Guardada en la Nube");
                                if(this.settings.sheetUrl) this.sincronizarConSheets([reg], true);
                            })
                            .catch(e => this.notificar("Error de red", true));
                    } else {
                        this.notificar("Jornada Guardada (Local)");
                    }

                    const idx = this.historial.findIndex(h => h.fecha === this.fechaSeleccionada);
                    if(idx > -1) { this.historial[idx] = reg; } else { this.historial.unshift(reg); }
                    
                    this.saveHist(); 
                    this.calcularTotales();
                    localStorage.removeItem('bus_borrador_seguridad');
                    this.screen = 1; 
                    this.actualizarIconos();
                },

                getWeekNumber(d) {
                    d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
                    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
                    var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                },

                calcularTotales() {
                    const hoy = new Date();
                    const d = hoy.getDate(), m = hoy.getMonth(), y = hoy.getFullYear();
                    let inicio, fin;
                    
                    if (d >= 16) { inicio = new Date(y, m, 16); fin = new Date(y, m + 1, 15); } 
                    else { inicio = new Date(y, m - 1, 16); fin = new Date(y, m, 15); }
                    this.cicloLabel = `Ciclo: 16/${inicio.getMonth()+1} al 15/${fin.getMonth()+1}`;

                    let filtrados = this.historial.filter(h => {
                        const [diaReg, mesReg] = h.fecha.split('/').map(Number);
                        let añoReg = y;
                        if (mesReg === 12 && inicio.getMonth() === 11) añoReg = inicio.getFullYear();
                        if (mesReg === 1 && fin.getMonth() === 0) añoReg = fin.getFullYear();
                        const fReg = new Date(añoReg, mesReg - 1, diaReg);
                        return fReg >= inicio && fReg <= fin;
                    }).sort((a,b) => b.id - a.id);

                    const grupos = {};
                    filtrados.forEach(h => {
                        const[dia, mes] = h.fecha.split('/').map(Number);
                        const numSemana = this.getWeekNumber(new Date(y, mes - 1, dia));
                        
                        if (!grupos[numSemana]) {
                            grupos[numSemana] = { registros:[], totalHorasMins: 0, totalKm: 0, totalDietas: 0, totalPartidas: 0, totalNocturnas: 0 };
                        }
                        
                        grupos[numSemana].registros.push(h);
                        let [hh, mm] = h.horas.split(':').map(Number);
                        grupos[numSemana].totalHorasMins += (hh * 60 + mm);
                        grupos[numSemana].totalKm += h.km;
                        grupos[numSemana].totalDietas += h.dietas;
                        if(h.esPartida) grupos[numSemana].totalPartidas++;
                    });

                    this.semanasAgrupadas = Object.keys(grupos).map(key => {
                        const g = grupos[key];
                        return { 
                            ...g, 
                            rango: `Semana ${key}`, 
                            totalHoras: `${Math.floor(g.totalHorasMins/60)}:${(g.totalHorasMins%60).toString().padStart(2,'0')}` 
                        };
                    }).sort((a, b) => b.registros[0].id - a.registros[0].id);

                    let mt = 0, kt = 0, dt = 0, pt = 0, ntMins = 0;
                    filtrados.forEach(h => {
                        let [hh,mm] = h.horas.split(':').map(Number); 
                        mt += (hh * 60 + mm); 
                        kt += h.km; 
                        dt += h.dietas;
                        if(h.esPartida) pt++; 
                        ntMins += this.getMinutosNocturnos(h);
                    });
                    
                    this.stats = { 
                        hTotales: `${Math.floor(mt/60)}:${(mt%60).toString().padStart(2,'0')}`, 
                        kmTotales: kt + ' KM', 
                        numDietas: dt, 
                        numPartidas: pt, 
                        horasNocturnas: this.formatMins(ntMins)
                    };
                },

                getRegistrosMesActual() {
                    const hoy = new Date();
                    const d = hoy.getDate(), m = hoy.getMonth(), y = hoy.getFullYear();
                    let inicio, fin;
                    if (d >= 16) { inicio = new Date(y, m, 16); fin = new Date(y, m + 1, 15); } 
                    else { inicio = new Date(y, m - 1, 16); fin = new Date(y, m, 15); }
                    
                    return this.historial.filter(h => {
                        const [diaReg, mesReg] = h.fecha.split('/').map(Number);
                        let añoReg = y;
                        if (mesReg === 12 && inicio.getMonth() === 11) añoReg = inicio.getFullYear();
                        if (mesReg === 1 && fin.getMonth() === 0) añoReg = fin.getFullYear();
                        return (new Date(añoReg, mesReg - 1, diaReg) >= inicio && new Date(añoReg, mesReg - 1, diaReg) <= fin);
                    }).sort((a,b) => a.id - b.id);
                },

                exportarMensualADrive() {
                    let filtrados = this.getRegistrosMesActual();
                    if(filtrados.length === 0) return this.notificar("No hay datos para exportar", true);
                    
                    let csv = "Fecha,Bus,Horas,Dietas,Horas Nocturnas,Kilometros,Partida,Festivo\n";
                    filtrados.forEach(r => {
                        let noc = this.formatMins(this.getMinutosNocturnos(r));
                        csv += `${r.fecha},${r.bus},${r.horas},${r.dietas},${noc},${r.km},${r.esPartida?'SI':'NO'},${r.esFestivo?'SI':'NO'}\n`;
                    });

                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const file = new File([blob], `Nomina_${this.cicloLabel.replace(/[^a-zA-Z0-9]/g, '_')}.csv`, { type: 'text/csv' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({ files: [file], title: 'Nómina', text: 'Resumen de nómina' }).catch(e => console.log(e));
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = file.name; a.click(); URL.revokeObjectURL(url);
                        this.notificar("Archivo descargado");
                    }
                },

                generarPDF() {
                    let filtrados = this.getRegistrosMesActual();
                    if(filtrados.length === 0) return this.notificar("No hay datos para exportar", true);

                    let printWindow = window.open('', '', 'width=800,height=900');
                    if(!printWindow) return this.notificar("Permite las ventanas emergentes (Pop-ups)", true);

                    let trs = '';
                    filtrados.forEach(r => {
                        let noc = this.getMinutosNocturnos(r) > 0 ? this.formatMins(this.getMinutosNocturnos(r)) : '-';
                        trs += `
                            <tr>
                                <td>${r.fecha}</td>
                                <td>${r.bus}</td>
                                <td>${r.horas}</td>
                                <td>${r.dietas}</td>
                                <td>${r.esPartida ? 'SÍ' : '-'}</td>
                                <td>${noc}</td>
                                <td>${r.km}</td>
                                <td>${r.esFestivo ? 'SÍ' : '-'}</td>
                            </tr>
                        `;
                    });

                    let html = `
                        <html>
                        <head>
                            <title>Nómina - ${this.cicloLabel}</title>
                            <style>
                                body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 30px; color: #333; }
                                h1 { text-align: center; color: #1e293b; font-size: 24px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
                                table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
                                th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
                                th { background-color: #f1f5f9; color: #475569; font-weight: bold; text-transform: uppercase; font-size: 12px; }
                                tr:nth-child(even) { background-color: #f8fafc; }
                                .resumen-caja { margin-top: 30px; border: 1px solid #cbd5e1; padding: 20px; background-color: #f1f5f9; border-radius: 8px; }
                                .resumen-caja h2 { margin-top: 0; font-size: 18px; color: #0f172a; }
                                .grid { display: flex; justify-content: space-between; flex-wrap: wrap; }
                                .grid div { width: 45%; margin-bottom: 10px; font-weight: bold; }
                                .grid span { font-weight: normal; }
                            </style>
                        </head>
                        <body>
                            <h1>Resumen Nómina - ${this.cicloLabel}</h1>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Bus</th>
                                        <th>Horas</th>
                                        <th>Dietas</th>
                                        <th>Part.</th>
                                        <th>Noc.</th>
                                        <th>Km</th>
                                        <th>Fes.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${trs}
                                </tbody>
                            </table>
                            <div class="resumen-caja">
                                <h2>Totales del Ciclo</h2>
                                <div class="grid">
                                    <div>Horas Totales: <span>${this.stats.hTotales}</span></div>
                                    <div>Dietas Totales: <span>${this.stats.numDietas}</span></div>
                                    <div>Turnos Partidos: <span>${this.stats.numPartidas}</span></div>
                                    <div>Horas Nocturnas: <span>${this.stats.horasNocturnas}</span></div>
                                    <div>Kilómetros Totales: <span>${this.stats.kmTotales}</span></div>
                                </div>
                            </div>
                            <p style="text-align: right; margin-top: 40px; font-size: 12px; color: #94a3b8; font-style: italic;">
                                Generado por MED BASHA PRO
                            </p>
                        </body>
                        </html>
                    `;

                    printWindow.document.open();
                    printWindow.document.write(html);
                    printWindow.document.close();
                    
                    setTimeout(() => { printWindow.print(); }, 500);
                },

                sincronizarConSheets(registros, modoOculto = false) {
                    if(!this.settings.sheetUrl) { 
                        if(!modoOculto) this.notificar("Falta URL de Google Sheets", true); 
                        return; 
                    }
                    const dataParaEnviar = registros.map(r => ({
                        fecha: r.fecha, bus: r.bus, hora: r.horas, dieta: r.dietas,
                        nocturna: this.formatMins(this.getMinutosNocturnos(r)), 
                        kilometros: r.km, plusPartido: r.esPartida ? 'SÍ' : 'NO'
                    }));
                    fetch(this.settings.sheetUrl, { method: 'POST', body: JSON.stringify(dataParaEnviar) })
                    .then(() => { if(!modoOculto) this.notificar("Enviado a Google Sheets"); })
                    .catch(() => { if(!modoOculto) this.notificar("Error al conectar con Sheets", true); });
                },

                borrarRegistro(id) { 
                    if(confirm('¿Borrar este registro?')) { 
                        this.historial = this.historial.filter(h => h.id !== id); 
                        this.saveHist(); 
                        if (this.esVip()) {
                            db.ref('jornadas/' + id).remove();
                        }
                        this.calcularTotales(); 
                        this.notificar("Registro eliminado");
                    } 
                },

                confirmarReset() {
                    if(confirm('🚨 ¿Estás seguro de borrar los datos de tu dispositivo?')) { 
                        this.historial =[]; this.saveHist(); this.calcularTotales(); 
                        this.notificar("Datos locales reseteados");
                    }
                },

                saveHist() { localStorage.setItem('bus_historial', JSON.stringify(this.historial)); },
                saveSett() { localStorage.setItem('bus_settings', JSON.stringify(this.settings)); },
                volverAlInicio() { this.screen = 1; this.actualizarIconos(); },
                
                changeMonth(s) { 
                    this.currentMonth += s; 
                    if(this.currentMonth > 11) { this.currentMonth = 0; this.currentYear++; } 
                    else if(this.currentMonth < 0) { this.currentMonth = 11; this.currentYear--; } 
                    this.renderCalendar(); 
                },
                
                abrirAlarma() { window.location.href = "intent://com.android.deskclock/#Intent;scheme=android-app;end"; },
                abrirCalculadora() { window.open('https://www.google.com/search?q=calculadora', '_blank'); },
                actualizarIconos() { this.$nextTick(() => lucide.createIcons()); }
            }
        }
    </script>
</body>
</html>
